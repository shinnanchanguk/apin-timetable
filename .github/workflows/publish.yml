name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - name: Configure npm auth (strip stray whitespace from the token)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TOKEN="$(printf '%s' "$NPM_TOKEN" | tr -d '[:space:]')"
          printf '//registry.npmjs.org/:_authToken=%s\n' "$TOKEN" > "$HOME/.npmrc"
      - run: npm publish --access public
